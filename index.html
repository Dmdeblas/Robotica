<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EP1 BDML</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 2vh 2vw;
            display: flex;
            box-sizing: border-box;
            height: 100vh;
            background: linear-gradient(135deg, #e3f0e5 0%, #c1d5c6 100%);
            font-family: 'Quicksand', sans-serif;
            color: #2c3e2e;
            gap: 20px;
        }
        .caja-mandos {
            width: 350px;
            display: flex;
            flex-direction: column;
            background: rgba(255, 255, 255, 0.85);
            border: 1px solid rgba(255,255,255,0.5);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
            overflow-y: auto;
        }
        .area-visual {
            position: relative;
            flex-grow: 1;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.85);
            border: 1px solid rgba(255,255,255,0.5);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        h1, h2 { 
            color: #557c5b; 
            margin-top: 0; 
        }
        .bloque-deslizador {
            border-radius: 12px;
            margin-bottom: 25px;
            padding: 15px;
            background: rgba(85, 124, 91, 0.05);
            border-left: 4px solid #557c5b;
        }
        .etiqueta-articulacion {
            display: flex;
            margin-bottom: 8px;
            justify-content: space-between;
            font-weight: 600;
        }
        input[type="range"] { 
            width: 100%; 
            accent-color: #557c5b; 
        }
        input[type="number"] {
            font-weight: 600;
            padding: 5px;
            width: 70px;
            border-radius: 5px;
            font-family: inherit;
            border: 1px solid #ccc;
        }
        .zona-resultados {
            border-left: 4px solid #d96c5b;
            padding: 20px;
            background: rgba(217, 108, 91, 0.1);
            border-radius: 12px;
            margin-top: auto;
        }
        .fila-eje {
            display: flex;
            font-size: 1.2rem;
            margin: 5px 0;
            font-weight: 700;
            justify-content: space-between;
        }
        #graficaRobot { 
            height: 100%; 
            width: 100%; 
        }
    </style>
</head>
<body>
    <div class="caja-mandos">
        <h1>Cinematica</h1>
        <p>Configuracion articular en tiempo real.</p>
        
        <div class="bloque-deslizador">
            <div class="etiqueta-articulacion">Angulo q1 <span><input type="number" id="caja_q1" value="0" step="1"> °</span></div>
            <input type="range" id="barra_q1" min="-45" max="225" value="0">
            <small>Limites: -45° a 225°</small>
        </div>
        
        <div class="bloque-deslizador">
            <div class="etiqueta-articulacion">Angulo q2 <span><input type="number" id="caja_q2" value="0" step="1"> °</span></div>
            <input type="range" id="barra_q2" min="0" max="125" value="0">
            <small>Limites: 0° a 125°</small>
        </div>
        
        <div class="bloque-deslizador">
            <div class="etiqueta-articulacion">Distancia q3 <span><input type="number" id="caja_q3" value="20" step="0.5"> cm</span></div>
            <input type="range" id="barra_q3" min="0" max="30" value="20" step="0.5">
            <small>Limites: 0 a 30 cm</small>
        </div>

        <div class="zona-resultados">
            <h2>Coordenadas (X, Y, Z)</h2>
            <div class="fila-eje"><span>Eje X:</span> <span id="res_X">0.00</span></div>
            <div class="fila-eje"><span>Eje Y:</span> <span id="res_Y">0.00</span></div>
            <div class="fila-eje"><span>Eje Z:</span> <span id="res_Z">0.00</span></div>
        </div>
    </div>

    <div class="area-visual">
        <div id="graficaRobot"></div>
    </div>

    <script>
        const longitudBase = 50;
        const dimensionHerramienta = 8;

        const elementosArticulares = {
            art1: { deslizable: document.getElementById('barra_q1'), numerico: document.getElementById('caja_q1') },
            art2: { deslizable: document.getElementById('barra_q2'), numerico: document.getElementById('caja_q2') },
            art3: { deslizable: document.getElementById('barra_q3'), numerico: document.getElementById('caja_q3') }
        };

        const pantallasEjes = {
            ejeX: document.getElementById('res_X'),
            ejeY: document.getElementById('res_Y'),
            ejeZ: document.getElementById('res_Z')
        };

        function comprobarRestricciones(v1, v2, v3) {
            let alertas = "";
            if (v1 < -45 || v1 > 225) alertas += "El angulo q1 debe mantenerse entre -45 y 225 grados.\n";
            if (v2 < 0 || v2 > 125) alertas += "El angulo q2 debe mantenerse entre 0 y 125 grados.\n";
            if (v3 < 0 || v3 > 30) alertas += "La distancia q3 debe mantenerse entre 0 y 30 cm.\n";

            if (alertas !== "") {
                alert("ALERTA DE RESTRICCION ESPACIAL:\n\n" + alertas);
                return false;
            }
            return true;
        }

        function calcularPosiciones(tipoEmisor) {
            let num1 = parseFloat(elementosArticulares.art1[tipoEmisor].value);
            let num2 = parseFloat(elementosArticulares.art2[tipoEmisor].value);
            let num3 = parseFloat(elementosArticulares.art3[tipoEmisor].value);

            if (tipoEmisor === 'numerico' && !comprobarRestricciones(num1, num2, num3)) {
                elementosArticulares.art1.numerico.value = elementosArticulares.art1.deslizable.value;
                elementosArticulares.art2.numerico.value = elementosArticulares.art2.deslizable.value;
                elementosArticulares.art3.numerico.value = elementosArticulares.art3.deslizable.value;
                return;
            }

            if (tipoEmisor === 'deslizable') {
                elementosArticulares.art1.numerico.value = num1;
                elementosArticulares.art2.numerico.value = num2;
                elementosArticulares.art3.numerico.value = num3;
            } else {
                elementosArticulares.art1.deslizable.value = num1;
                elementosArticulares.art2.deslizable.value = num2;
                elementosArticulares.art3.deslizable.value = num3;
            }

            let rad1 = num1 * Math.PI / 180;
            let rad2 = num2 * Math.PI / 180;

            let posX0 = 0, posY0 = 0, posZ0 = 0;
            let posX1 = 0, posY1 = 0, posZ1 = longitudBase;

            let posX2 = num3 * Math.cos(rad1) * Math.sin(rad2);
            let posY2 = num3 * Math.sin(rad1) * Math.sin(rad2);
            let posZ2 = longitudBase + num3 * Math.cos(rad2);

            let posX3 = (num3 + dimensionHerramienta) * Math.cos(rad1) * Math.sin(rad2);
            let posY3 = (num3 + dimensionHerramienta) * Math.sin(rad1) * Math.sin(rad2);
            let posZ3 = longitudBase + (num3 + dimensionHerramienta) * Math.cos(rad2);

            pantallasEjes.ejeX.textContent = posX3.toFixed(2);
            pantallasEjes.ejeY.textContent = posY3.toFixed(2);
            pantallasEjes.ejeZ.textContent = posZ3.toFixed(2);

            Plotly.animate('graficaRobot', {
                data: [
                    { x: [posX0, posX1], y: [posY0, posY1], z: [posZ0, posZ1] },
                    { x: [posX1, posX2], y: [posY1, posY2], z: [posZ1, posZ2] },
                    { x: [posX2, posX3], y: [posY2, posY3], z: [posZ2, posZ3] },
                    { x: [posX3], y: [posY3], z: [posZ3] }
                ]
            }, {
                transition: { duration: 0 },
                frame: { duration: 0, redraw: true }
            });
        }

        function prepararLienzo() {
            let dibujoBase = { type: 'scatter3d', mode: 'lines+markers', line: { width: 10, color: '#2c3e2e' }, marker: { size: 4, color: '#2c3e2e' }, name: 'Base' };
            let dibujoEslabon = { type: 'scatter3d', mode: 'lines', line: { width: 8, color: '#557c5b' }, name: 'Eslabon' };
            let dibujoHerramienta = { type: 'scatter3d', mode: 'lines', line: { width: 6, color: '#d96c5b' }, name: 'Herramienta' };
            let dibujoPunta = { type: 'scatter3d', mode: 'markers', marker: { size: 8, color: '#d96c5b', symbol: 'diamond' }, name: 'Punta' };

            let configuracionVista = {
                scene: {
                    xaxis: { range: [-90, 90], title: 'Plano X (cm)' },
                    yaxis: { range: [-90, 90], title: 'Plano Y (cm)' },
                    zaxis: { range: [0, 100], title: 'Plano Z (cm)' },
                    aspectmode: 'cube'
                },
                margin: { l: 0, r: 0, b: 0, t: 0 },
                paper_bgcolor: 'rgba(0,0,0,0)',
                plot_bgcolor: 'rgba(0,0,0,0)',
                showlegend: false
            };

            Plotly.newPlot('graficaRobot', [dibujoBase, dibujoEslabon, dibujoHerramienta, dibujoPunta], configuracionVista, {responsive: true}).then(() => {
                calcularPosiciones('deslizable');
            });
        }

        const llaves = Object.keys(elementosArticulares);
        for (let j = 0; j < llaves.length; j++) {
            let k = llaves[j];
            elementosArticulares[k].deslizable.addEventListener('input', () => calcularPosiciones('deslizable'));
            elementosArticulares[k].numerico.addEventListener('change', () => calcularPosiciones('numerico'));
        }

        window.onload = prepararLienzo;
    </script>
</body>
</html>
